apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: spring-server
    spec:
      containers:
        - name: main
          image: ghcr.io/kedify/springboot:tracing
          # command: ["sleep", "60000"]
          env:
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: https://router-collector.observability.svc:4317
          - name: OTEL_TRACES_EXPORTER
            value: none
          - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
            value: ""
          - name: SERVER # to indicate that this image should be used as server, otherwise it pings the server
            value: ""
          - name: SERVICE_NAME
            value: "server"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
              scheme: HTTP
            failureThreshold: 3
            initialDelaySeconds: 20
            periodSeconds: 25
            successThreshold: 1
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
              scheme: HTTP
            failureThreshold: 3
            initialDelaySeconds: 50
            periodSeconds: 25
            successThreshold: 1
            timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: spring-server
spec:
  type: NodePort
  ports:
    - port: 8080
      name: http
      nodePort: 31197
  selector:
    app: spring-server
